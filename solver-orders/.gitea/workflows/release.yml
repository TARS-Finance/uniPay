name: Docker Build and Push (Release)

on:
  release:
    types: [published]

jobs:
  build-push:
    runs-on: amd64
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set release tag variables
        shell: bash
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          SAFE_TAG="${RELEASE_TAG//\//-}"
          IMAGE_TAG="version.affine.trading/hashiraio/${{ github.event.repository.name }}:amd64-${SAFE_TAG}"

          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "SAFE_TAG=${SAFE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

          echo "Release tag: $RELEASE_TAG"
          echo "Image: $IMAGE_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: version.affine.trading
          username: ${{ secrets.GITEAUSERNAME }}
          password: ${{ secrets.GITEATOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.IMAGE_TAG }}
          cache-to: type=inline,mode=max
          secrets: |
            ghpat=${{ secrets.GHPAT }}

      - name: Build summary
        run: |
          echo "✓ Built and pushed: ${{ env.IMAGE_TAG }}"
          echo "Commit: ${{ github.sha }}"
