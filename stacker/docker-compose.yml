services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stacker
      POSTGRES_USER: stacker
      POSTGRES_PASSWORD: stacker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stacker -d stacker"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
